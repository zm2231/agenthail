name = "agenthail-push"
main = "src/index.js"
compatibility_date = "2026-07-16"
compatibility_flags = ["nodejs_compat"]

[[ratelimits]]
name = "REGISTER_RATE_LIMITER"
namespace_id = "1001"

[ratelimits.simple]
limit = 10
period = 60

[[ratelimits]]
name = "SEND_RATE_LIMITER"
namespace_id = "1002"

[ratelimits.simple]
limit = 120
period = 60

[[kv_namespaces]]
binding = "PUSH_DEVICES"

[[durable_objects.bindings]]
name = "APP_ATTEST_CHALLENGES"
class_name = "AppAttestChallenge"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AppAttestChallenge"]
