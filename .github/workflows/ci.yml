name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Race tests
        run: go test ./... -race -count=1
      - name: Installer lint
        run: |
          find . -type f -name '*.sh' -not -path './.git/*' -print0 | xargs -0 -n1 bash -n
          bash -n packaging/scripts/preinstall packaging/scripts/postinstall
          python3 -m py_compile sidecar/sidecar.py

  installer:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sidecar/package-lock.json
      - name: Install and upgrade test
        run: scripts/test-install-upgrade.sh

  package:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build package
        env:
          AGENTHAIL_ALLOW_UNNOTARIZED: "1"
          AGENTHAIL_VERSION: v0.0.0-ci
        run: scripts/build-pkg.sh
      - name: Verify package artifact
        env:
          AGENTHAIL_ALLOW_UNNOTARIZED: "1"
        run: scripts/test-pkg-artifact.sh dist/Agenthail-v0.0.0-ci-arm64.pkg
      - name: Verify install, upgrade, and uninstall
        run: scripts/test-pkg-install.sh dist/Agenthail-v0.0.0-ci-arm64.pkg
