name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: Release version such as v0.1.6
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos-package:
    runs-on: macos-15
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Import Developer ID certificates
        env:
          APPLICATION_P12: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          INSTALLER_P12: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
        run: |
          : "${APPLICATION_P12:?missing APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64}"
          : "${INSTALLER_P12:?missing APPLE_DEVELOPER_ID_INSTALLER_P12_BASE64}"
          : "${P12_PASSWORD:?missing APPLE_DEVELOPER_ID_P12_PASSWORD}"
          umask 077
          KEYCHAIN_PATH="$RUNNER_TEMP/agenthail-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          printf '%s' "$APPLICATION_P12" | base64 --decode > "$RUNNER_TEMP/Application.p12"
          printf '%s' "$INSTALLER_P12" | base64 --decode > "$RUNNER_TEMP/Installer.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/Application.p12" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security import "$RUNNER_TEMP/Installer.p12" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/productbuild -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v "$KEYCHAIN_PATH"
      - name: Configure notarization
        env:
          NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          printf '%s' "$NOTARY_KEY" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          xcrun notarytool store-credentials agenthail-ci --key "$RUNNER_TEMP/AuthKey.p8" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID"
      - name: Test source
        run: |
          go test ./... -race -count=1
          go vet ./...
      - name: Build package
        timeout-minutes: 30
        env:
          AGENTHAIL_NOTARY_PROFILE: agenthail-ci
          AGENTHAIL_VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: scripts/build-pkg.sh
      - name: Verify package artifact
        run: scripts/test-pkg-artifact.sh dist/Agenthail-*.pkg
      - name: Verify clean install, upgrade, and uninstall
        run: scripts/test-pkg-install.sh dist/Agenthail-*.pkg
      - name: Build release archive
        timeout-minutes: 30
        env:
          AGENTHAIL_NOTARY_PROFILE: agenthail-ci
          AGENTHAIL_VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: scripts/package-release.sh
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          draft: true
          files: |
            dist/Agenthail-*.pkg
            dist/Agenthail-*.pkg.sha256
            dist/agenthail-*.tar.gz
            dist/agenthail-*.tar.gz.sha256
