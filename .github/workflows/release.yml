name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: Release version such as v0.2.0
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  push-relay-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: push-relay/package-lock.json
      - name: Install locked relay dependencies
        working-directory: push-relay
        run: npm ci --ignore-scripts
      - name: Test relay
        working-directory: push-relay
        run: npm test

  macos-package:
    runs-on: macos-15
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Import Developer ID certificates
        env:
          APPLICATION_P12: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          INSTALLER_P12: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
        run: |
          : "${APPLICATION_P12:?missing APPLE_DEVELOPER_ID_APPLICATION_P12_BASE64}"
          : "${INSTALLER_P12:?missing APPLE_DEVELOPER_ID_INSTALLER_P12_BASE64}"
          : "${P12_PASSWORD:?missing APPLE_DEVELOPER_ID_P12_PASSWORD}"
          umask 077
          KEYCHAIN_PATH="$RUNNER_TEMP/agenthail-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          printf '%s' "$APPLICATION_P12" | base64 --decode > "$RUNNER_TEMP/Application.p12"
          printf '%s' "$INSTALLER_P12" | base64 --decode > "$RUNNER_TEMP/Installer.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/Application.p12" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security import "$RUNNER_TEMP/Installer.p12" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/productbuild -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v "$KEYCHAIN_PATH"
      - name: Configure notarization
        env:
          NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          : "${NOTARY_KEY:?missing APPLE_NOTARY_KEY_BASE64}"
          printf '%s' "$NOTARY_KEY" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          xcrun notarytool store-credentials agenthail-ci --key "$RUNNER_TEMP/AuthKey.p8" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID"
      - name: Test source
        run: |
          go test ./... -race -count=1
          go vet ./...
          xcodebuild -project native/Agenthail.xcodeproj -scheme AgenthailIOS -configuration Release -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO build
      - name: Build package
        timeout-minutes: 30
        env:
          AGENTHAIL_NOTARY_PROFILE: agenthail-ci
          AGENTHAIL_VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: scripts/build-pkg.sh
      - name: Verify package artifact
        run: scripts/test-pkg-artifact.sh dist/Agenthail-*.pkg
      - name: Verify clean install, upgrade, and uninstall
        run: scripts/test-pkg-install.sh dist/Agenthail-*.pkg
      - name: Build release archive
        timeout-minutes: 30
        env:
          AGENTHAIL_NOTARY_PROFILE: agenthail-ci
          AGENTHAIL_VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: scripts/package-release.sh
      - uses: actions/upload-artifact@v4
        with:
          name: agenthail-macos-release
          path: |
            dist/Agenthail-*.pkg
            dist/Agenthail-*.pkg.sha256
            dist/agenthail-*.tar.gz
            dist/agenthail-*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  ios-archive:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate --spec native/project.yml
      - name: Import iOS distribution signing assets
        env:
          DISTRIBUTION_P12: ${{ secrets.APPLE_DISTRIBUTION_P12_BASE64 }}
          DISTRIBUTION_P12_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_P12_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.APPLE_IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          : "${DISTRIBUTION_P12:?missing APPLE_DISTRIBUTION_P12_BASE64}"
          : "${DISTRIBUTION_P12_PASSWORD:?missing APPLE_DISTRIBUTION_P12_PASSWORD}"
          : "${PROVISIONING_PROFILE:?missing APPLE_IOS_PROVISIONING_PROFILE_BASE64}"
          umask 077
          KEYCHAIN_PATH="$RUNNER_TEMP/agenthail-ios-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          printf '%s' "$DISTRIBUTION_P12" | base64 --decode > "$RUNNER_TEMP/Distribution.p12"
          printf '%s' "$PROVISIONING_PROFILE" | base64 --decode > "$RUNNER_TEMP/Agenthail.mobileprovision"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/Distribution.p12" -k "$KEYCHAIN_PATH" -P "$DISTRIBUTION_P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep 'Apple Distribution: ZAIN SOHAIL MERCHANT (Q5Y75DVV4M)'
          security cms -D -i "$RUNNER_TEMP/Agenthail.mobileprovision" -o "$RUNNER_TEMP/Agenthail-profile.plist"
          PROFILE_UUID="$(plutil -extract UUID raw -o - "$RUNNER_TEMP/Agenthail-profile.plist")"
          PROFILE_NAME="$(plutil -extract Name raw -o - "$RUNNER_TEMP/Agenthail-profile.plist")"
          PROFILE_EXPIRATION="$(plutil -extract ExpirationDate raw -o - "$RUNNER_TEMP/Agenthail-profile.plist")"
          PROFILE_CERT_SHA="$(plutil -extract DeveloperCertificates.0 raw -o - "$RUNNER_TEMP/Agenthail-profile.plist" | base64 --decode | shasum -a 256 | awk '{print $1}')"
          SIGNING_CERT_SHA="$(security find-certificate -c 'Apple Distribution: ZAIN SOHAIL MERCHANT (Q5Y75DVV4M)' -p "$KEYCHAIN_PATH" | openssl x509 -outform DER | shasum -a 256 | awk '{print $1}')"
          test "$(plutil -extract TeamIdentifier.0 raw -o - "$RUNNER_TEMP/Agenthail-profile.plist")" = "Q5Y75DVV4M"
          test "$(plutil -extract Entitlements.application-identifier raw -o - "$RUNNER_TEMP/Agenthail-profile.plist")" = "Q5Y75DVV4M.com.agenthail.ios"
          test "$PROFILE_CERT_SHA" = "$SIGNING_CERT_SHA"
          [[ "$PROFILE_EXPIRATION" > "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" ]]
          mkdir -p "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$RUNNER_TEMP/Agenthail.mobileprovision" "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          cp "$RUNNER_TEMP/Agenthail.mobileprovision" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          test "$PROFILE_NAME" = "iOS Team Store Provisioning Profile: com.agenthail.ios"
      - name: Configure App Store Connect authentication
        env:
          ASC_KEY: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
        run: |
          : "${ASC_KEY:?missing APPLE_NOTARY_KEY_BASE64}"
          : "${ASC_KEY_ID:?missing APPLE_NOTARY_KEY_ID}"
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s' "$ASC_KEY" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          chmod 600 "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
      - name: Archive iOS app
        env:
          ASC_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          xcodebuild archive \
            -project native/Agenthail.xcodeproj \
            -scheme AgenthailIOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Agenthail.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM=Q5Y75DVV4M \
            CODE_SIGN_STYLE=Automatic \
            MARKETING_VERSION="${RELEASE_VERSION#v}" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER"
      - name: Export App Store IPA
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store-connect</string>
            <key>signingStyle</key><string>automatic</string>
            <key>teamID</key><string>Q5Y75DVV4M</string>
          </dict></plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Agenthail.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"
      - name: Verify iOS release metadata
        run: |
          plist="$RUNNER_TEMP/Agenthail.xcarchive/Products/Applications/Agenthail.app/Info.plist"
          test "$(plutil -extract NSCameraUsageDescription raw -o - "$plist")" = "Scan the pairing code shown by Agenthail on your Mac."
          test "$(plutil -extract UIBackgroundModes.0 raw -o - "$plist")" = "remote-notification"
          mkdir -p "$RUNNER_TEMP/ipa-inspect"
          unzip -q "$RUNNER_TEMP/export/Agenthail.ipa" -d "$RUNNER_TEMP/ipa-inspect"
          app="$RUNNER_TEMP/ipa-inspect/Payload/Agenthail.app"
          codesign --verify --deep --strict "$app"
          codesign -d --entitlements :- "$app" > "$RUNNER_TEMP/ios-entitlements.plist" 2>/dev/null
          test "$(/usr/libexec/PlistBuddy -c 'Print :aps-environment' "$RUNNER_TEMP/ios-entitlements.plist")" = "production"
          test "$(/usr/libexec/PlistBuddy -c 'Print :com.apple.developer.devicecheck.appattest-environment' "$RUNNER_TEMP/ios-entitlements.plist")" = "production"
          test "$(/usr/libexec/PlistBuddy -c 'Print :get-task-allow' "$RUNNER_TEMP/ios-entitlements.plist")" = "false"
      - name: Validate IPA
        env:
          ASC_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          output="$(xcrun altool --validate-app -f "$RUNNER_TEMP/export/Agenthail.ipa" -t ios --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID" 2>&1)"
          printf '%s\n' "$output"
          if grep -q 'ERROR:' <<<"$output"; then exit 1; fi
      - uses: actions/upload-artifact@v4
        with:
          name: agenthail-ios-release
          path: ${{ runner.temp }}/export/Agenthail.ipa
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: [push-relay-check, macos-package, ios-archive]
    runs-on: macos-15
    timeout-minutes: 55
    env:
      RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: agenthail-macos-release
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: agenthail-ios-release
          path: ios
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: push-relay/package-lock.json
      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          draft: true
          files: |
            dist/Agenthail-*.pkg
            dist/Agenthail-*.pkg.sha256
            dist/agenthail-*.tar.gz
            dist/agenthail-*.tar.gz.sha256
      - name: Configure App Store Connect authentication
        env:
          ASC_KEY: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
        run: |
          : "${ASC_KEY:?missing APPLE_NOTARY_KEY_BASE64}"
          : "${ASC_KEY_ID:?missing APPLE_NOTARY_KEY_ID}"
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s' "$ASC_KEY" | base64 --decode > "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          chmod 600 "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
      - name: Upload validated IPA to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          output="$(xcrun altool --upload-app -f ios/Agenthail.ipa -t ios --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID" 2>&1)"
          printf '%s\n' "$output"
          if grep -q 'ERROR:' <<<"$output"; then exit 1; fi
      - name: Wait for TestFlight processing
        env:
          ASC_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          ASC_BUILD_NUMBER: ${{ github.run_number }}
          ASC_MARKETING_VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: node push-relay/scripts/wait-testflight-build.mjs
      - name: Deploy validated relay
        working-directory: push-relay
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          : "${CLOUDFLARE_API_TOKEN:?missing CLOUDFLARE_API_TOKEN}"
          npm ci --ignore-scripts
          ./node_modules/.bin/wrangler deploy --var "RELAY_VERSION:${RELEASE_VERSION}"
      - name: Verify relay compatibility
        run: |
          health="$(curl --fail --retry 8 --retry-all-errors --retry-delay 3 https://agenthail-push.merchantzains.workers.dev/health)"
          jq -e --arg version "$RELEASE_VERSION" '.ok == true and .protocol == 2 and .version == $version and .appAttest.required == true and .appAttest.configured == true and .apns.configured == true and .rateLimits.configured == true and (.capabilities | index("app-attest"))' <<<"$health"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$RELEASE_VERSION" --draft=false --latest
